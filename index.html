<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixus · Generador LinkedIn</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #162937;
    --blue: #617ECA;
    --blue-light: #8fa5d8;
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #e2e5ea;
    --text: #1a2332;
    --text-2: #5a6577;
    --text-3: #9aa3b0;
    --success: #1a7a4a;
    --success-bg: #eaf7f0;
    --radius: 10px;
    --radius-lg: 16px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--navy); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 36px; height: 36px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: white; }
  .header-name { font-size: 16px; font-weight: 600; color: white; }
  .header-sub { font-size: 12px; color: var(--blue-light); margin-top: 1px; }
  .header-badge { font-size: 11px; background: rgba(97,126,202,0.2); color: var(--blue-light); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(97,126,202,0.3); }

  /* MAIN */
  .main { max-width: 860px; margin: 0 auto; padding: 32px 24px; display: flex; flex-direction: column; gap: 20px; }

  /* ACCOUNT */
  .account-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .account-btn { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 12px; cursor: pointer; text-align: left; display: flex; flex-direction: column; gap: 4px; transition: all .15s; font-family: inherit; }
  .account-btn:hover { border-color: var(--blue); background: #f0f4ff; }
  .account-btn.active { border-color: var(--blue); background: #f0f4ff; box-shadow: 0 0 0 3px rgba(97,126,202,.15); }
  .acc-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--blue); }
  .acc-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .acc-role { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); margin-bottom: 10px; }

  /* TOPICS */
  .topics-grid { display: flex; flex-direction: column; gap: 8px; }
  .topic-pill { background: #f8f9fc; border: 1.5px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; text-align: left; font-size: 13px; color: var(--text-2); line-height: 1.4; transition: all .15s; font-family: inherit; display: flex; align-items: flex-start; gap: 10px; }
  .topic-pill:hover { border-color: var(--blue); background: #f0f4ff; color: var(--text); }
  .topic-pill.selected { border-color: var(--blue); background: #f0f4ff; color: var(--text); font-weight: 500; }
  .topic-pill .tp-num { font-size: 11px; font-weight: 700; color: var(--blue); min-width: 18px; margin-top: 1px; }
  .topics-loading { font-size: 13px; color: var(--text-3); padding: 16px; text-align: center; }
  .btn-refresh { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: var(--text-2); cursor: pointer; font-family: inherit; margin-top: 8px; transition: all .15s; }
  .btn-refresh:hover { border-color: var(--blue); color: var(--blue); }

  /* INPUT */
  .topic-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-size: 14px; color: var(--text); font-family: inherit; resize: none; outline: none; transition: border-color .15s; min-height: 60px; line-height: 1.5; background: #fafbfc; }
  .topic-input:focus { border-color: var(--blue); background: white; }
  .topic-input::placeholder { color: var(--text-3); }

  /* SECTION TITLE */
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); margin-bottom: 6px; }

  /* GENERATE BTN */
  .generate-btn { width: 100%; background: var(--navy); color: white; border: none; border-radius: var(--radius); padding: 15px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
  .generate-btn:hover:not(:disabled) { background: #1e3a4d; }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* OUTPUT */
  .output-section { display: none; flex-direction: column; gap: 16px; }
  .output-section.visible { display: flex; }
  .output-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .output-block-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); background: #fafbfc; }
  .output-block-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
  .copy-btn { font-size: 12px; font-weight: 500; color: var(--blue); background: none; border: 1px solid var(--blue); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-family: inherit; transition: all .15s; }
  .copy-btn:hover { background: #f0f4ff; }
  .copy-btn.copied { color: var(--success); border-color: var(--success); background: var(--success-bg); }
  .output-content { padding: 20px; font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* HASHTAGS */
  .hashtag-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 20px; }
  .hashtag-pill { background: #f0f4ff; color: var(--blue); border: 1px solid rgba(97,126,202,.3); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 500; }

  /* PLACA SECTION */
  .placa-section { padding: 20px; }
  .placa-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); margin-bottom: 12px; }
  .placa-wrap { position: relative; }

  /* Canvas */
  #placa-canvas { width: 100%; border-radius: 10px; display: block; max-width: 600px; }

  /* Download btn */
  .download-btn { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; background: var(--navy); color: white; border: none; border-radius: 8px; padding: 12px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; max-width: 600px; width: 100%; }
  .download-btn:hover { background: #1e3a4d; }
  .download-btn svg { width: 16px; height: 16px; }

  /* ERROR */
  .error-msg { background: #fff5f5; border: 1px solid #fcc; border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: #c0392b; display: none; }

  @media (max-width: 600px) {
    .account-grid { grid-template-columns: 1fr; }
    .main { padding: 20px 16px; }
    .header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo">FX</div>
    <div>
      <div class="header-name">Fixus · Generador LinkedIn</div>
      <div class="header-sub">Consultora para PyMEs</div>
    </div>
  </div>
  <div class="header-badge">IA embebida</div>
</div>

<div class="main">

  <!-- PASO 1 -->
  <div>
    <div class="section-title">1 · ¿Quién publica?</div>
    <div class="account-grid">
      <button class="account-btn active" data-account="leo" onclick="selectAccount('leo', this)">
        <span class="acc-tag">Martes</span>
        <span class="acc-name">Leo Evangelista</span>
        <span class="acc-role">El analista · cuenta personal</span>
      </button>
      <button class="account-btn" data-account="facu" onclick="selectAccount('facu', this)">
        <span class="acc-tag">Jueves</span>
        <span class="acc-name">Facundo Vallina</span>
        <span class="acc-role">El estratega · cuenta personal</span>
      </button>
      <button class="account-btn" data-account="fixus" onclick="selectAccount('fixus', this)">
        <span class="acc-tag">Jueves</span>
        <span class="acc-name">Fixus Consultora</span>
        <span class="acc-role">El observatorio · página empresa</span>
      </button>
    </div>
  </div>

  <!-- PASO 2: TEMAS SUGERIDOS -->
  <div class="card" id="topics-card">
    <div class="card-label">2 · Elegí un tema o escribí el tuyo</div>
    <div class="topics-grid" id="topics-grid">
      <div class="topics-loading">Generando temas sugeridos...</div>
    </div>
    <button class="btn-refresh" onclick="loadTopics()">↻ Nuevas ideas</button>
  </div>

  <!-- TEMA PROPIO -->
  <div class="card">
    <div class="card-label">O escribí tu propio tema</div>
    <textarea class="topic-input" id="topic-input" placeholder="Ej: cómo una empresa proveedora de YPF consiguió financiamiento cuando los bancos le dijeron que no..."></textarea>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="generate-btn" id="generate-btn" onclick="generate()">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Generar posteo y placa</span>
  </button>

  <!-- OUTPUT -->
  <div class="output-section" id="output-section">

    <div class="output-block">
      <div class="output-block-header">
        <div class="output-block-title"><span class="dot"></span>Texto del posteo</div>
        <button class="copy-btn" id="copy-post" onclick="copyText('post-content', 'copy-post')">Copiar</button>
      </div>
      <div class="output-content" id="post-content"></div>
    </div>

    <div class="output-block">
      <div class="output-block-header">
        <div class="output-block-title"><span class="dot"></span>Placa lista para descargar</div>
        <button class="copy-btn" id="copy-brief" onclick="copyBriefText()">Copiar brief</button>
      </div>
      <div class="placa-section">
        <canvas id="placa-canvas"></canvas>
        <button class="download-btn" onclick="downloadPlaca()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar placa (PNG · 1200×628)
        </button>
      </div>
    </div>

    <div class="output-block">
      <div class="output-block-header">
        <div class="output-block-title"><span class="dot"></span>Hashtags</div>
        <button class="copy-btn" id="copy-tags" onclick="copyText('hashtag-raw', 'copy-tags')">Copiar</button>
      </div>
      <div class="hashtag-list" id="hashtag-list"></div>
      <div id="hashtag-raw" style="display:none"></div>
    </div>

  </div>
</div>

<script>
let currentAccount = 'leo';
let currentData = null;

const profiles = {
  leo: {
    name: 'Leonardo Evangelista',
    initials: 'LE',
    placaType: 'B',
    topicContext: 'análisis crediticio de PyMEs, evaluación de balances, lo que mira un evaluador de crédito, errores comunes en la presentación financiera, diferencia entre riesgo real y riesgo percibido en una PyME',
    voice: `Sos Leonardo Evangelista, co-founder de Fixus Consultora para PyMEs en Mendoza, Argentina. Tu voz es la del analista: hablás desde adentro del número, con precisión técnica pero lenguaje accesible. Compartís lo que ves cuando evaluás empresas, errores comunes en balances, lo que realmente mira un evaluador de crédito. Tu lector ideal es el CFO o dueño que quiere entender cómo lo miran desde el otro lado.`,
    topicInstruction: 'Generá 5 ideas de temas para LinkedIn desde la perspectiva de un analista crediticio de PyMEs. Deben ser temas concretos, basados en experiencia real evaluando empresas. Foco en: análisis de balances, riesgo crediticio, evaluación financiera, errores de PyMEs al buscar crédito.',
  },
  facu: {
    name: 'Facundo Vallina',
    initials: 'FV',
    placaType: 'B',
    topicContext: 'storytelling de clientes, estrategia de financiamiento, instrumentos del mercado de capitales para PyMEs, proveedores Oil & Gas y Minería, casos de éxito en conseguir financiamiento',
    voice: `Sos Facundo Vallina, co-founder de Fixus Consultora para PyMEs en Mendoza, Argentina. Tu voz es la del estratega: hablás desde la relación con el cliente y el mercado, con storytelling y experiencias vividas. Contás cómo empresas encontraron el instrumento correcto, qué pasa cuando un proveedor de Oil & Gas no sabe que califica para una ON. Tu voz es narrativa, humana, de alguien que estuvo en la mesa con el cliente.`,
    topicInstruction: 'Generá 5 ideas de temas para LinkedIn desde la perspectiva de un estratega en financiamiento de PyMEs. Deben ser temas narrativos, de experiencia con clientes, casos reales. Foco en: proveedores Oil & Gas y Minería, instrumentos de mercado de capitales, SGRs, ONs, historias de financiamiento.',
  },
  fixus: {
    name: 'Fixus Consultora',
    initials: 'FX',
    placaType: 'C',
    topicContext: 'estadísticas del mercado de financiamiento PyME en Argentina, conceptos educativos sobre SGRs, ONs, FCE, ALyCEs, datos del sector Oil & Gas y Minería',
    voice: `Sos Fixus Consultora para PyMEs, especializada en financiamiento de PyMEs en Argentina con foco en proveedores de Oil & Gas y Minería. Tu voz es institucional: educativa, informativa, sin primera persona. Publicás datos del mercado, estadísticas, explicaciones sobre instrumentos financieros. Objetivo: ser la referencia técnica del sector.`,
    topicInstruction: 'Generá 5 ideas de temas educativos para LinkedIn desde una consultora de financiamiento PyME. Deben ser temas informativos con datos o estadísticas. Foco en: mercado de capitales argentino, SGRs, ONs, FCE, datos del sector proveedor de Oil & Gas y Minería, estadísticas de financiamiento PyME.',
  }
};

const placeholders = {
  leo: 'Ej: por qué los bancos rechazan PyMEs que en realidad son solventes...',
  facu: 'Ej: cómo una empresa proveedora de YPF consiguió financiamiento cuando los bancos le dijeron que no...',
  fixus: 'Ej: qué es una SGR y cómo ayuda a las PyMEs a acceder al crédito...'
};

async function callClaude(systemPrompt, userMsg) {
  const res = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: systemPrompt,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  if (!data.content || !data.content[0]) throw new Error('Sin respuesta');
  return data.content[0].text;
}

async function loadTopics() {
  const profile = profiles[currentAccount];
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '<div class="topics-loading">Generando ideas...</div>';

  try {
    const raw = await callClaude(
      `Sos un experto en content marketing B2B para el sector financiero argentino. ${profile.topicInstruction} Respondé SOLO en JSON sin texto extra: {"temas": ["tema 1", "tema 2", "tema 3", "tema 4", "tema 5"]}. Cada tema debe ser una frase concreta de máximo 15 palabras, accionable y específica.`,
      'Generá los 5 temas ahora.'
    );
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderTopics(parsed.temas);
  } catch(e) {
    grid.innerHTML = '<div class="topics-loading" style="color:#c0392b">Error al cargar temas. Intentá de nuevo.</div>';
  }
}

function renderTopics(temas) {
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = temas.map((t, i) => `
    <button class="topic-pill" onclick="selectTopic(this, '${t.replace(/'/g, "\\'")}')">
      <span class="tp-num">${i + 1}</span>
      <span>${t}</span>
    </button>
  `).join('');
}

function selectTopic(el, tema) {
  document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('topic-input').value = tema;
}

function selectAccount(account, el) {
  currentAccount = account;
  document.querySelectorAll('.account-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('output-section').classList.remove('visible');
  document.getElementById('topic-input').value = '';
  document.getElementById('topic-input').placeholder = placeholders[account];
  document.querySelectorAll('.topic-pill').forEach(p => p.classList.remove('selected'));
  loadTopics();
}

async function generate() {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) { showError('Elegí un tema o escribí el tuyo.'); return; }
  hideError();
  setLoading(true);

  const profile = profiles[currentAccount];

  const systemPrompt = `${profile.voice}

Generás contenido para LinkedIn siguiendo estas reglas:

TEXTO DEL POSTEO:
- Entre 1.200 y 1.800 caracteres
- Primer párrafo: hook fuerte en máximo 2 líneas (lo que se ve antes del "ver más")
- Desarrollo: 3-4 párrafos breves, sin paja
- Cierre: reflexión o pregunta que invite a comentar
- Sin hashtags en el cuerpo
- Lenguaje rioplatense natural, nunca corporativo
- Sin bullet points. Todo en párrafos.
${currentAccount === 'fixus' ? '- Sin primera persona. Voz institucional.' : '- Primera persona, voz personal y auténtica.'}

BRIEF VISUAL:
${profile.placaType === 'B'
  ? '- categoria: 2-4 palabras que clasifiquen el tema\n- hook: exactamente el mismo hook del primer párrafo, máximo 10 palabras'
  : '- dato: UN número o porcentaje impactante (ej: "72%", "$4.200M", "1 de 3")\n- frase: máximo 10 palabras que expliquen el dato'}

HASHTAGS: 4-6 hashtags relevantes, mezcla temáticos y de alcance.

Respondé SOLO en JSON sin texto extra:
{
  "post": "texto completo",
  ${profile.placaType === 'B' ? '"categoria": "texto", "hook": "texto",' : '"dato": "texto", "frase": "texto",'}
  "hashtags": ["#tag1", "#tag2", "#tag3", "#tag4"]
}`;

  try {
    const raw = await callClaude(systemPrompt, `Tema del día: ${topic}`);
    const clean = raw.replace(/```json|```/g, '').trim();
    currentData = JSON.parse(clean);
    renderOutput(currentData, profile);
  } catch(e) {
    showError('Error al generar. Revisá la conexión e intentá de nuevo.');
  } finally {
    setLoading(false);
  }
}

function renderOutput(data, profile) {
  document.getElementById('post-content').textContent = data.post;
  renderPlaca(data, profile);
  const tags = data.hashtags;
  document.getElementById('hashtag-list').innerHTML = tags.map(t => `<span class="hashtag-pill">${t}</span>`).join('');
  document.getElementById('hashtag-raw').textContent = tags.join(' ');
  document.getElementById('output-section').classList.add('visible');
  setTimeout(() => document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function renderPlaca(data, profile) {
  const canvas = document.getElementById('placa-canvas');
  const W = 1200, H = 628;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  const NAVY = '#162937';
  const BLUE = '#617ECA';
  const BLUE_LIGHT = '#8FA5D8';
  const WHITE = '#FFFFFF';

  ctx.fillStyle = NAVY;
  ctx.fillRect(0, 0, W, H);

  if (profile.placaType === 'B') {
    // Barra lateral
    ctx.fillStyle = BLUE;
    ctx.fillRect(0, 0, 8, H);

    // Categoría
    ctx.fillStyle = BLUE_LIGHT;
    ctx.font = 'bold 22px -apple-system, Arial, sans-serif';
    ctx.letterSpacing = '3px';
    ctx.fillText((data.categoria || '').toUpperCase(), 60, 100);

    // Línea separadora sutil
    ctx.fillStyle = 'rgba(97,126,202,0.25)';
    ctx.fillRect(60, 118, W - 120, 1);

    // Hook título
    ctx.fillStyle = WHITE;
    ctx.letterSpacing = '0px';
    const hook = data.hook || '';
    const lines = wrapText(ctx, hook, W - 140, 'bold 58px -apple-system, Arial, sans-serif');
    ctx.font = 'bold 58px -apple-system, Arial, sans-serif';
    const startY = H / 2 - (lines.length * 72) / 2 + 30;
    lines.forEach((line, i) => {
      ctx.fillText(line, 60, startY + i * 72);
    });

  } else {
    // Placa C — decoraciones de fondo
    ctx.fillStyle = 'rgba(97,126,202,0.07)';
    ctx.beginPath();
    ctx.moveTo(W - 200, 0); ctx.lineTo(W, 0); ctx.lineTo(W, 200); ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(97,126,202,0.04)';
    ctx.beginPath();
    ctx.moveTo(0, H); ctx.lineTo(150, H); ctx.lineTo(0, H - 150); ctx.closePath();
    ctx.fill();

    // Número / dato grande
    const dato = data.dato || '';
    ctx.fillStyle = BLUE;
    ctx.font = `bold ${dato.length > 5 ? 120 : 150}px -apple-system, Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(dato, W / 2, H / 2 - 20);

    // Frase explicativa
    ctx.fillStyle = WHITE;
    ctx.font = '28px -apple-system, Arial, sans-serif';
    const fraseLines = wrapText(ctx, data.frase || '', 700, '28px -apple-system, Arial, sans-serif');
    ctx.font = '28px -apple-system, Arial, sans-serif';
    fraseLines.forEach((line, i) => {
      ctx.fillText(line, W / 2, H / 2 + 80 + i * 40);
    });

    // Línea divisoria
    ctx.fillStyle = BLUE;
    ctx.fillRect(W / 2 - 30, H / 2 + 150 + (fraseLines.length - 1) * 40, 60, 3);

    ctx.textAlign = 'left';
  }
}

function wrapText(ctx, text, maxWidth, font) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function downloadPlaca() {
  const canvas = document.getElementById('placa-canvas');
  const profile = profiles[currentAccount];
  const name = profile.name.replace(' ', '_');
  const link = document.createElement('a');
  link.download = `Fixus_LinkedIn_${name}_placa.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function copyBriefText() {
  if (!currentData) return;
  const profile = profiles[currentAccount];
  let text = '';
  if (profile.placaType === 'B') {
    text = `Categoría: ${currentData.categoria}\nHook/título: ${currentData.hook}`;
  } else {
    text = `Dato central: ${currentData.dato}\nFrase: ${currentData.frase}`;
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-brief');
    btn.textContent = 'Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar brief'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyText(elId, btnId) {
  const text = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = 'Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function setLoading(v) {
  document.getElementById('generate-btn').disabled = v;
  document.getElementById('spinner').style.display = v ? 'block' : 'none';
  document.getElementById('btn-text').textContent = v ? 'Generando...' : 'Generar posteo y placa';
}
function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.style.display = 'block'; }
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

// Init
loadTopics();
</script>
